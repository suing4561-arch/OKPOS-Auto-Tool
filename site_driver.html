<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>배송 기사님 — 대상정보통신</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--line:#e4e0d8;--text:#1a1916;--muted:#6b6860;--dim:#a8a49c;--green:#1a7a4a;--green-bg:#e8f5ee;--green-mid:#2d9e65;--red:#c0392b;--red-bg:#fdecea;--amber:#b85c00;--amber-bg:#fef3e2;--blue:#1a5fa8;--blue-bg:#e8f0fb;--blue-mid:#2874cc;--purple:#5a3fb5;--purple-bg:#f0eeff;--mono:"Space Mono",monospace;--sans:"Noto Sans KR",sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
.app{width:100%;max-width:390px;background:var(--surface);min-height:100vh;display:flex;flex-direction:column}
.status-bar{padding:12px 20px 0;display:flex;justify-content:space-between;align-items:center}
.st-time{font-family:var(--mono);font-size:13px;font-weight:700}
.st-icons{display:flex;gap:5px;color:var(--muted);font-size:14px}
.app-header{padding:12px 20px 14px;border-bottom:0.5px solid var(--line)}
.driver-info-card{margin:14px 20px 0;background:var(--purple-bg);border:0.5px solid rgba(90,63,181,.2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.driver-avatar{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid rgba(90,63,181,.2)}
.driver-name{font-size:17px;font-weight:700;color:var(--text)}
.driver-sub{font-size:12px;color:var(--muted);margin-top:2px}
.progress-bar-wrap{margin:14px 20px 0;background:var(--surface2);border-radius:12px;padding:12px 14px}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-title{font-size:13px;font-weight:700;color:var(--text)}
.progress-count{font-family:var(--mono);font-size:15px;font-weight:700}
.progress-track{height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--green-mid);transition:width .5s}
.section-label{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.4px;text-transform:uppercase;padding:14px 20px 8px}
.delivery-list{padding:0 20px;display:flex;flex-direction:column;gap:10px;flex:1}
.dlv-card{border:0.5px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface)}
.dlv-card.is-done{opacity:.6}
.dlv-card.is-active{border-color:var(--blue-mid);box-shadow:0 0 0 2px var(--blue-bg)}
.dlv-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
.dlv-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.dlv-num.waiting{background:var(--surface2);color:var(--muted)}
.dlv-num.active{background:var(--blue-bg);color:var(--blue-mid);border:2px solid var(--blue-mid)}
.dlv-num.done{background:var(--green-bg);color:var(--green)}
.dlv-info{flex:1;min-width:0}
.dlv-store{font-size:15px;font-weight:700;color:var(--text)}
.dlv-addr{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dlv-items{font-size:11px;color:var(--dim);margin-top:2px}
.dlv-body{border-top:0.5px solid var(--line);padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.dlv-addr-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.dlv-addr-text{font-size:13px;color:var(--text);flex:1}
.call-btn{display:inline-flex;align-items:center;gap:5px;background:var(--blue-bg);color:var(--blue-mid);border:0.5px solid rgba(26,95,168,.2);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0}
.map-btn{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);color:var(--muted);border:0.5px solid var(--line);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0;cursor:pointer}
.items-box{background:var(--surface2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.6}
.big-action-btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.big-action-btn:active{opacity:.85}
.big-action-btn i{font-size:22px}
.btn-start{background:var(--blue-mid);color:#fff}
.btn-done{background:var(--green-mid);color:#fff}
.btn-issue{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(192,57,43,.3)!important}
.done-stamp{background:var(--green-bg);border:0.5px solid rgba(26,122,74,.25);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.done-stamp-icon{font-size:22px;color:var(--green)}
.done-stamp-title{font-size:14px;font-weight:700;color:var(--green)}
.done-stamp-time{font-size:12px;color:var(--green-mid);margin-top:2px}
.all-done-banner{margin:14px 20px;background:var(--green-bg);border:0.5px solid rgba(26,122,74,.25);border-radius:14px;padding:20px;text-align:center;display:none}
.all-done-banner.show{display:block}
.all-done-icon{font-size:40px;margin-bottom:8px}
.all-done-title{font-size:18px;font-weight:700;color:var(--green)}
.all-done-sub{font-size:13px;color:var(--green-mid);margin-top:4px}
/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-sheet{width:100%;max-width:390px;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 36px;display:flex;flex-direction:column;gap:14px}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 4px}
.modal-title{font-size:17px;font-weight:700}
.modal-sub{font-size:13px;color:var(--muted);line-height:1.5}
.photo-area{border:1.5px dashed var(--line);border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:var(--surface2)}
.photo-area:active{background:var(--line)}
.photo-area i{font-size:32px;color:var(--dim)}
.photo-label{font-size:13px;font-weight:700;color:var(--muted)}
.photo-sub{font-size:11px;color:var(--dim)}
.modal-btn-row{display:flex;gap:8px}
.mbtn{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;border:0.5px solid var(--line)}
.mbtn.cancel{background:var(--surface2);color:var(--text)}
.mbtn.ok{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.mbtn.report{background:var(--red);color:#fff;border-color:var(--red)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:999px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:440px){body{padding:20px 0 40px;background:#e8e5e0;align-items:flex-start}.app{border-radius:28px;box-shadow:0 4px 40px rgba(0,0,0,.12);min-height:auto}}
</style>
</head>
<body>
<div class="app">
  <div class="status-bar">
    <span class="st-time" id="stTime">09:41</span>
    <div class="st-icons"><div style="width:7px;height:7px;border-radius:50%;background:var(--green-mid);animation:pulse 1.5s infinite" title="실시간 연결"></div><i class="ti ti-wifi"></i><i class="ti ti-battery-2"></i></div>
  </div>
  <div class="app-header">
    <div style="font-size:17px;font-weight:700">오늘 배송</div>
    <div style="font-size:11px;color:var(--dim);margin-top:2px" id="todayDate"></div>
  </div>
  <div class="driver-info-card">
    <div class="driver-avatar">🚚</div>
    <div>
      <div class="driver-name">박배달 기사님</div>
      <div class="driver-sub">한국식품 전담 · 010-1234-5678</div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span class="progress-title">오늘 배송 진행률</span>
      <span class="progress-count" id="progressCount" style="color:var(--green-mid)">0 / 3</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="all-done-banner" id="allDoneBanner">
    <div class="all-done-icon">🎉</div>
    <div class="all-done-title">오늘 배송 완료!</div>
    <div class="all-done-sub">수고하셨습니다. 모든 납품이 완료됐습니다.</div>
  </div>
  <div class="section-label">배송 목록</div>
  <div class="delivery-list" id="deliveryList" style="padding-bottom:24px"></div>
</div>

<!-- 완료 모달 -->
<div class="modal-overlay" id="doneModal" onclick="if(event.target===this)closeModal('doneModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="doneModalTitle">도착 완료</div>
    <div class="modal-sub" id="doneModalSub">납품 완료를 확인합니다.</div>
    <div class="photo-area" onclick="showToast('카메라를 엽니다')">
      <i class="ti ti-camera"></i>
      <span class="photo-label">완료 사진 촬영</span>
      <span class="photo-sub">선택사항 · 증빙용 권장</span>
    </div>
    <div class="modal-btn-row">
      <button class="mbtn cancel" onclick="closeModal('doneModal')">취소</button>
      <button class="mbtn ok" onclick="confirmDone()"><i class="ti ti-circle-check" style="font-size:16px;vertical-align:-2px"></i> 완료 처리</button>
    </div>
  </div>
</div>

<!-- 이슈 모달 -->
<div class="modal-overlay" id="issueModal" onclick="if(event.target===this)closeModal('issueModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">이슈 보고</div>
    <div class="modal-sub">상황을 본사에 즉시 알립니다. 사진 첨부 시 처리가 빠릅니다.</div>
    <div class="photo-area" onclick="showToast('카메라를 엽니다')">
      <i class="ti ti-camera"></i>
      <span class="photo-label">현장 사진 촬영</span>
      <span class="photo-sub">파손·오배송·접촉불가 등</span>
    </div>
    <textarea id="issueNote" placeholder="이슈 내용을 간단히 입력하세요" style="width:100%;padding:10px 12px;border-radius:10px;border:0.5px solid var(--line);background:var(--surface2);font-size:14px;font-family:var(--sans);resize:none;min-height:80px;outline:none"></textarea>
    <div class="modal-btn-row">
      <button class="mbtn cancel" onclick="closeModal('issueModal')">취소</button>
      <button class="mbtn report" onclick="confirmIssue()"><i class="ti ti-alert-triangle" style="font-size:16px;vertical-align:-2px"></i> 이슈 보고</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>
<script src="auth.js"></script>
<script>
const DELIVERIES = [
  {id:1,store:'부산 1호점',addr:'부산시 부산진구 ○○동 123-4',contact:'010-9999-1111',items:'닭가슴살 50kg · 쌀 5포대 · 소스류 3세트',amount:1240000,status:'shipping',departedAt:'13:20',arrivedAt:null},
  {id:2,store:'부산 해운대점',addr:'부산시 해운대구 ○○로 56',contact:'010-8888-2222',items:'닭가슴살 30kg · 소스 세트 2개',amount:587000,status:'waiting',departedAt:null,arrivedAt:null},
  {id:3,store:'부산 사직점',addr:'부산시 연제구 ○○대로 88',contact:'010-7777-3333',items:'전품목 7종 정기 주문',amount:2140000,status:'waiting',departedAt:null,arrivedAt:null},
];
if(window.SmartBaljuAuth){
  const params=new URLSearchParams(location.search),target=params.get('delivery'),rows=SmartBaljuAuth.loadData().deliveries||[];
  const list=target?rows.filter(d=>d.id===target):rows;
  if(list.length)DELIVERIES.splice(0,DELIVERIES.length,...list.map((d,i)=>({id:d.id,store:d.storeName||('?? '+(i+1)),addr:d.address||'',contact:d.phone||'',items:d.items||'',amount:d.amount||0,status:d.status==='done'?'done':d.status==='shipping'?'shipping':'waiting',departedAt:d.startedAt?String(d.startedAt).slice(11,16):null,arrivedAt:d.doneAt?String(d.doneAt).slice(11,16):null})));
}

let pendingId=null;

function now(){return new Date().toTimeString().slice(0,5)}

function updateProgress(){
  const done=DELIVERIES.filter(d=>d.status==='done').length;
  const total=DELIVERIES.length;
  document.getElementById('progressCount').textContent=done+' / '+total;
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
  document.getElementById('allDoneBanner').classList.toggle('show',done===total);
}

function render(){
  updateProgress();
  const activeIdx=DELIVERIES.findIndex(d=>d.status==='shipping'||d.status==='waiting');
  document.getElementById('deliveryList').insertAdjacentHTML('afterend','<div id="bulkDoneBar" style="padding:0 20px 18px"><button class="big-action-btn btn-done" onclick="completeCheckedDeliveries()">?? ????</button></div>');
  const oldBulk=document.querySelectorAll('#bulkDoneBar');oldBulk.forEach((el,i)=>{if(i<oldBulk.length-1)el.remove()});
  document.getElementById('deliveryList').innerHTML=DELIVERIES.map((d,i)=>{
    const isActive=d.status==='shipping';
    const isDone=d.status==='done';
    const isWaiting=d.status==='waiting';
    const isFirst=i===activeIdx;
    const numCls=isDone?'done':isActive?'active':'waiting';
    const numContent=isDone?'<i class="ti ti-check" style="font-size:13px"></i>':isActive?'<i class="ti ti-truck-delivery" style="font-size:13px"></i>':(i+1);

    let body='';
    if(!isDone){
      body+=`<div class="dlv-addr-row">
        <span class="dlv-addr-text"><i class="ti ti-map-pin" style="font-size:13px;color:var(--muted);margin-right:4px"></i>${d.addr}</span>
        <a href="tel:${d.contact}" class="call-btn"><i class="ti ti-phone" style="font-size:14px"></i>전화</a>
      </div>`;
    }
    if(isActive||isDone){
      body+=`<div class="items-box">${d.items}<br><span style="color:var(--text);font-weight:700;font-family:var(--mono)">${d.amount.toLocaleString()}원</span></div>`;
    }
    if(isActive){
      body+=`<div style="display:flex;gap:4px;align-items:center;font-size:12px;color:var(--muted)"><i class="ti ti-clock" style="font-size:13px"></i>출발: ${d.departedAt}</div>`;
      body+=`<button class="big-action-btn btn-done" onclick="openDone(${d.id})"><i class="ti ti-circle-check"></i>도착 완료</button>`;
      body+=`<button class="big-action-btn btn-issue" style="padding:12px" onclick="openIssue(${d.id})"><i class="ti ti-alert-triangle" style="font-size:18px"></i>이슈 보고</button>`;
    }
    if(isWaiting&&isFirst){
      body+=`<button class="big-action-btn btn-start" onclick="startDelivery(${d.id})"><i class="ti ti-truck-delivery"></i>배송 출발</button>`;
    }
    if(isDone){
      body=`<div class="done-stamp"><div class="done-stamp-icon"><i class="ti ti-circle-check"></i></div><div><div class="done-stamp-title">납품 완료</div><div class="done-stamp-time">${d.arrivedAt} 도착 확인</div></div></div>`;
    }

    return `<div class="dlv-card${isActive?' is-active':''}${isDone?' is-done':''}">
      <div class="dlv-header">
        <input class="dlv-check" type="checkbox" value="${d.id}" ${isDone?'disabled':''} style="width:18px;height:18px"><div class="dlv-num ${numCls}">${numContent}</div>
        <div class="dlv-info">
          <div class="dlv-store">${d.store}</div>
          <div class="dlv-addr">${d.addr}</div>
          ${isActive?`<div class="dlv-items">${d.items}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${isActive?'<span style="background:var(--blue-bg);color:var(--blue-mid);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px">배송중</span>':''}
          ${isDone?'<span style="background:var(--green-bg);color:var(--green);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px">완료</span>':''}
          ${isWaiting?'<span style="background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px">대기</span>':''}
        </div>
      </div>
      ${body?`<div class="dlv-body">${body}</div>`:''}
    </div>`;
  }).join('');
}

function startDelivery(id){
  const d=DELIVERIES.find(x=>x.id===id);
  if(!d)return;
  d.status='shipping'; d.departedAt=now();
  showToast('출발! 🚚 가맹점·본사에 알림 전송됐습니다');
  render();
}
function openDone(id){pendingId=id;document.getElementById('doneModal').classList.add('show');}
function openIssue(id){pendingId=id;document.getElementById('issueModal').classList.add('show');}
function confirmDone(){
  const d=DELIVERIES.find(x=>x.id===pendingId);
  if(d){d.status='done';d.arrivedAt=now();if(window.SmartBaljuAuth)SmartBaljuAuth.markDeliveryDone(pendingId);}
  closeModal('doneModal');
  showToast('납품 완료! ✓ 가맹점·본사에 알림 전송됐습니다');
  render();
}
function completeCheckedDeliveries(){document.querySelectorAll('.dlv-check:checked').forEach(ch=>{const d=DELIVERIES.find(x=>String(x.id)===ch.value);if(d){d.status='done';d.arrivedAt=now();if(window.SmartBaljuAuth)SmartBaljuAuth.markDeliveryDone(d.id)}});showToast('?? ???? ??');render()}
function confirmIssue(){
  closeModal('issueModal');
  showToast('이슈 보고 완료. 본사에 즉시 알림 전송됐습니다');
}
function closeModal(id){document.getElementById(id).classList.remove('show');}

/* 시계 */
(function tick(){
  const n=new Date();
  document.getElementById('stTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  setTimeout(tick,1000);
})();

/* 날짜 */
(function(){
  const days=['일','월','화','수','목','금','토'],n=new Date();
  document.getElementById('todayDate').textContent=n.getFullYear()+'년 '+( n.getMonth()+1)+'월 '+n.getDate()+'일 ('+days[n.getDay()]+')';
})();

/* 토스트 */
let _tt;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}

render();
</script>
</body>
</html>
