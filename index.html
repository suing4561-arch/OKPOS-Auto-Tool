<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Balju 대상정보통신</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--navy:#1a1916;--blue:#1a5fa8;--blue-mid:#2874cc;--green-mid:#2d9e65;--amber:#b85c00;--purple:#5a3fb5;--line:#e4e0d8;--text:#1a1916;--muted:#6b6860;--dim:#a8a49c;--mono:"Space Mono",monospace;--sans:"Noto Sans KR",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:420px}
.logo-area{text-align:center;margin-bottom:32px}
.logo-mark{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.logo-title{font-size:28px;font-weight:900;color:var(--navy);letter-spacing:-.5px}
.logo-sub{font-size:14px;color:var(--muted);margin-top:6px}
/* 濡쒓렇????*/
.login-card{background:var(--surface);border:.5px solid var(--line);border-radius:20px;padding:28px 24px;box-shadow:0 12px 40px rgba(26,25,22,.08)}
.login-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px}
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.3px}
.form-input{width:100%;padding:12px 14px;border-radius:12px;border:.5px solid var(--line);background:#faf9f7;font-size:15px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s,background .15s}
.form-input:focus{border-color:var(--blue-mid);background:var(--surface)}
.login-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--navy);color:#fff;font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer;margin-top:6px;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover{opacity:.88}.login-btn:active{opacity:.75}
.error-msg{background:#fdecea;border:.5px solid rgba(192,57,43,.3);border-radius:9px;padding:10px 14px;font-size:13px;color:#c0392b;font-weight:500;display:none;margin-top:10px}
.error-msg.show{display:block}
/* ??븷蹂?留곹겕 (媛쒕컻/?뚯뒪?몄슜) */
.dev-links{margin-top:24px;border:.5px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface)}
.dev-header{padding:12px 16px;border-bottom:.5px solid var(--line);font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.dev-link{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--line);text-decoration:none;color:var(--text);transition:background .15s;cursor:pointer}
.dev-link:last-child{border-bottom:none}
.dev-link:hover{background:var(--bg)}
.dev-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dev-name{font-size:14px;font-weight:700}
.dev-sub{font-size:11px;color:var(--muted);margin-top:1px}
.dev-arrow{margin-left:auto;font-size:18px;color:var(--dim)}
/* ?ㅽ뵾??*/
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;margin-top:24px;font-size:12px;color:var(--dim)}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo-area">
    <div class="logo-mark">Daesang Information</div>
    <div class="logo-title">Smart Balju</div>
    <div class="logo-sub">스마트 발주 통합 시스템</div>
  </div>

  <!-- 濡쒓렇??-->
  <div class="login-card">
    <div class="login-title">로그인</div>
    <div class="form-field">
      <div class="form-label">아이디</div>
      <input class="form-input" id="loginId" type="text" placeholder="아이디를 입력하세요" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()">
    </div>
    <div class="form-field">
      <div class="form-label">鍮꾨?踰덊샇</div>
      <input class="form-input" id="loginPw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnText">로그인</span>
      <div class="spinner" id="loginSpinner"></div>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- ??븷蹂?諛붾줈媛湲?(愿由ъ옄?? -->
  <div class="dev-links">
    <div class="dev-header">바로가기</div>
    <a class="dev-link" href="master.html">
      <div class="dev-icon" style="background:#f1f5f9;color:#334155">?숋툘</div>
      <div><div class="dev-name">Master 관리자</div><div class="dev-sub">계정·권한 관리</div></div>
      <span class="dev-arrow">→</span>
    </a>
    <a class="dev-link" href="site_hq.html">
      <div class="dev-icon" style="background:#e8f0fb;color:#1a5fa8">?룫</div>
      <div><div class="dev-name">본사 관리자</div><div class="dev-sub">기초정보·배송·통계</div></div>
      <span class="dev-arrow">→</span>
    </a>
    <a class="dev-link" href="site_franchise.html">
      <div class="dev-icon" style="background:#e8f5ee;color:#1a7a4a">?룵</div>
      <div><div class="dev-name">가맹점</div><div class="dev-sub">발주·배송추적·매출</div></div>
      <span class="dev-arrow">→</span>
    </a>
    <a class="dev-link" href="site_supplier.html">
      <div class="dev-icon" style="background:#f0eeff;color:#5a3fb5">?슊</div>
      <div><div class="dev-name">납품업체</div><div class="dev-sub">기사등록·배송배정·정산</div></div>
      <span class="dev-arrow">→</span>
    </a>
    <a class="dev-link" href="site_driver.html">
      <div class="dev-icon" style="background:#fef3e2;color:#b85c00">?쎎</div>
      <div><div class="dev-name">배송기사</div><div class="dev-sub">배송목록·완료처리</div></div>
      <span class="dev-arrow">→</span>
    </a>
  </div>

  <div class="footer">짤 2026 ??곸젙蹂댄넻??쨌 Smart Balju v2.0</div>
</div>

<script src="auth.js"></script>
<script>
const Auth = window.SmartBaljuAuth;

async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('errorMsg');
  errEl.classList.remove('show');

  if(!id || !pw) { errEl.textContent='아이디와 비밀번호를 입력하세요.'; errEl.classList.add('show'); return; }

  // 濡쒕뵫 ?쒖떆
  document.getElementById('loginBtnText').textContent = '로그인 중...';
  document.getElementById('loginSpinner').classList.add('show');
  document.getElementById('loginBtn').disabled = true;

  try {
    const result = await Auth.login(id, pw);
    if(result.ok) {
      Auth.redirectByRole(result.user);
    } else {
      errEl.textContent = result.error;
      errEl.classList.add('show');
    }
  } catch(e) {
    errEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
    errEl.classList.add('show');
  } finally {
    document.getElementById('loginBtnText').textContent = '로그인';
    document.getElementById('loginSpinner').classList.remove('show');
    document.getElementById('loginBtn').disabled = false;
  }
}

// ?대? 濡쒓렇?몃맂 寃쎌슦 ?먮룞 ?대룞
const session = Auth.getSession();
if(session) Auth.redirectByRole(session);

window.addEventListener('load', ()=>{ document.getElementById('loginId').focus(); });
</script>
</body>
</html>
