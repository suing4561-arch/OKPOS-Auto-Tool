<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대상정보통신 Master 계정관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f7fb;--panel:#fff;--text:#162033;--muted:#6b7280;--line:#dbe3ee;--navy:#17233c;--blue:#2563eb;--green:#16a34a;--yellow:#d97706;--red:#dc2626;--purple:#7c3aed;--shadow:0 14px 40px rgba(20,31,51,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select{font:inherit}button{cursor:pointer}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.side{background:var(--navy);color:#fff;padding:24px 18px}
.brand{font-size:20px;font-weight:900}.brand small{display:block;margin-top:4px;color:rgba(255,255,255,.55);font-size:12px}
.nav{display:grid;gap:8px;margin-top:30px}.nav button{border:0;border-radius:10px;padding:12px 14px;text-align:left;background:rgba(255,255,255,.08);color:#fff;font-weight:800}.nav button.active{background:#fff;color:var(--navy)}
.main{padding:26px;overflow:auto}
.top{display:flex;align-items:center;gap:12px;margin-bottom:18px}.title{font-size:26px;font-weight:900}.top-actions{margin-left:auto;display:flex;gap:8px}
.btn{border:1px solid var(--line);border-radius:9px;padding:9px 13px;background:var(--panel);color:var(--text);font-weight:800}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
label{display:block;margin-bottom:5px;color:var(--muted);font-size:12px;font-weight:900}input,select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fff;color:var(--text);outline:none}input:focus,select:focus{border-color:var(--blue)}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.filter{border:1px solid var(--line);border-radius:999px;padding:7px 12px;background:#fff;color:var(--muted);font-size:12px;font-weight:900}.filter.active{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:11px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-size:11px;text-transform:uppercase}.actions{display:flex;gap:5px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:900;background:#eef2ff;color:#3730a3}.role-franchise{background:#ecfdf5;color:#047857}.role-hq{background:#eff6ff;color:#1d4ed8}.role-supplier{background:#fff7ed;color:#c2410c}.role-driver{background:#f5f3ff;color:#6d28d9}.role-master{background:#f8fafc;color:#334155}
.status-active{background:#ecfdf5;color:#047857}.status-inactive{background:#f1f5f9;color:#475569}.status-suspended{background:#fef2f2;color:#b91c1c}.status-expired{background:#fff7ed;color:#c2410c}.status-password_reset_required{background:#fefce8;color:#a16207}
.mini{border:1px solid var(--line);border-radius:7px;background:#fff;padding:5px 8px;font-size:11px;font-weight:900}.mini.green{color:var(--green)}.mini.red{color:var(--red)}.mini.yellow{color:var(--yellow)}.mini.blue{color:var(--blue)}
.muted{color:var(--muted);font-size:12px}.login-ok{color:var(--green);font-weight:900}.login-no{color:var(--red);font-weight:900}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.55);z-index:30;padding:18px}.modal.show{display:flex}.box{width:100%;max-width:560px;background:#fff;border-radius:18px;padding:22px;box-shadow:0 24px 80px rgba(0,0,0,.25)}.box h2{margin-bottom:14px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;border-radius:999px;padding:11px 18px;font-weight:900;font-size:13px;opacity:0;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:820px){.shell{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:10}.main{padding:16px}.top{align-items:flex-start;flex-direction:column}.top-actions{margin-left:0}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand">대상정보통신<small>Smart Balju Master</small></div>
    <div class="nav">
      <button class="active">계정관리</button>
      <button onclick="location.href='site_hq.html'">본사 화면</button>
      <button onclick="location.href='site_franchise.html'">가맹점 화면</button>
      <button onclick="location.href='site_supplier.html'">납품업체 화면</button>
      <button onclick="location.href='site_driver.html'">배송기사 화면</button>
    </div>
  </aside>
  <main class="main">
    <div class="top">
      <div>
        <div class="title">Master 계정관리</div>
        <div class="muted">hq · franchise · supplier · driver 계정을 생성/수정하고 로그인 가능 상태를 관리합니다.</div>
      </div>
      <div class="top-actions">
        <button class="btn" onclick="resetMock()">mock 초기화</button>
        <button class="btn primary" onclick="openEditor()">계정 생성</button>
      </div>
    </div>

    <section class="card">
      <div class="filters" id="filters"></div>
      <div style="overflow:auto">
        <table>
          <thead><tr><th>역할</th><th>계정</th><th>사업자/연결ID</th><th>상태</th><th>로그인</th><th>최근정보</th><th>관리</th></tr></thead>
          <tbody id="userBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<div class="modal" id="editorModal">
  <div class="box">
    <h2 id="editorTitle">계정 생성</h2>
    <div class="grid">
      <div><label>역할</label><select id="fRole"><option value="hq">프렌차이즈 본사</option><option value="franchise">가맹점</option><option value="supplier">납품업체</option><option value="driver">배송기사</option><option value="master">Master</option></select></div>
      <div><label>상태</label><select id="fStatus"><option value="active">정상</option><option value="inactive">비활성</option><option value="suspended">사용중지</option><option value="expired">계약만료</option><option value="password_reset_required">비밀번호 재설정 필요</option></select></div>
      <div><label>담당자명</label><input id="fName"></div>
      <div><label>상호명</label><input id="fBusinessName"></div>
      <div><label>사업자번호</label><input id="fBusinessNumber"></div>
      <div><label>연락처</label><input id="fPhone"></div>
      <div><label>로그인 ID</label><input id="fLoginId"></div>
      <div><label>초기/변경 비밀번호</label><input id="fPassword" placeholder="수정 시 비워두면 유지"></div>
      <div><label>brandId</label><input id="fBrandId"></div>
      <div><label>storeId</label><input id="fStoreId"></div>
      <div><label>supplierId</label><input id="fSupplierId"></div>
      <div><label>driverId</label><input id="fDriverId"></div>
    </div>
    <div class="top-actions" style="margin-top:16px">
      <button class="btn" onclick="closeEditor()">취소</button>
      <button class="btn primary" onclick="saveEditor()">저장</button>
    </div>
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="box">
    <h2>계정 상세보기</h2>
    <pre id="detailText" style="white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:12px;max-height:60vh;overflow:auto"></pre>
    <div class="top-actions" style="margin-top:14px"><button class="btn primary" onclick="closeDetail()">닫기</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="auth.js"></script>
<script>
const Auth=window.SmartBaljuAuth;
let filter="all",editingUid="";
const FILTERS=[
  ["all","전체"],["hq","본사"],["franchise","가맹점"],["supplier","납품업체"],["driver","배송기사"],
  ["active","활성"],["inactive","비활성"],["suspended","사용중지"],["expired","계약만료"],["password_reset_required","비밀번호 재설정 필요"]
];
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2600)}
function loginAvailable(user){return !Auth.BLOCKED_LOGIN_STATUSES.includes(user.status)}
function renderFilters(){document.getElementById("filters").innerHTML=FILTERS.map(([key,label])=>`<button class="filter ${filter===key?"active":""}" onclick="setFilter('${key}')">${label}</button>`).join("")}
function setFilter(key){filter=key;render()}
function filteredUsers(){return Auth.loadUsers().filter(user=>filter==="all"||user.role===filter||user.status===filter)}
function render(){
  renderFilters();
  const users=filteredUsers();
  document.getElementById("userBody").innerHTML=users.map(user=>`
    <tr>
      <td><span class="pill role-${esc(user.role)}">${esc(Auth.ROLE_LABELS[user.role]||user.role)}</span></td>
      <td><strong>${esc(user.businessName||user.name)}</strong><div class="muted">${esc(user.name)} · ${esc(user.loginId)}</div></td>
      <td><div>${esc(user.businessNumber||"-")}</div><div class="muted">brand:${esc(user.brandId||"-")} / store:${esc(user.storeId||"-")} / supplier:${esc(user.supplierId||"-")} / driver:${esc(user.driverId||"-")}</div></td>
      <td><span class="pill status-${esc(user.status)}">${esc(Auth.STATUS_LABELS[user.status]||user.status)}</span></td>
      <td>${loginAvailable(user)?'<span class="login-ok">가능</span>':'<span class="login-no">불가능</span>'}${user.mustChangePassword?'<div class="muted">비밀번호 변경 필요</div>':""}</td>
      <td><div class="muted">생성 ${esc((user.createdAt||"").slice(0,10))}</div><div class="muted">최근 로그인 ${esc(user.lastLoginAt?user.lastLoginAt.slice(0,16):"-")}</div></td>
      <td><div class="actions">
        <button class="mini blue" onclick="openEditor('${esc(user.uid)}')">수정</button>
        <button class="mini green" onclick="statusAction('${esc(user.uid)}','activate')">활성화</button>
        <button class="mini" onclick="statusAction('${esc(user.uid)}','deactivate')">비활성화</button>
        <button class="mini yellow" onclick="statusAction('${esc(user.uid)}','suspend')">사용중지</button>
        <button class="mini red" onclick="statusAction('${esc(user.uid)}','expire')">계약만료</button>
        <button class="mini blue" onclick="resetPassword('${esc(user.uid)}')">비밀번호 초기화</button>
        <button class="mini" onclick="showDetail('${esc(user.uid)}')">상세보기</button>
      </div></td>
    </tr>`).join("")||'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:30px">계정이 없습니다.</td></tr>';
}
function openEditor(uid){
  editingUid=uid||"";
  const user=editingUid?Auth.loadUsers().find(row=>row.uid===editingUid):null;
  document.getElementById("editorTitle").textContent=user?"계정 수정":"계정 생성";
  ["Role","Status","Name","BusinessName","BusinessNumber","Phone","LoginId","Password","BrandId","StoreId","SupplierId","DriverId"].forEach(key=>document.getElementById("f"+key).value="");
  if(user){
    fRole.value=user.role;fStatus.value=user.status;fName.value=user.name;fBusinessName.value=user.businessName;fBusinessNumber.value=user.businessNumber;fPhone.value=user.phone;fLoginId.value=user.loginId;fBrandId.value=user.brandId;fStoreId.value=user.storeId;fSupplierId.value=user.supplierId;fDriverId.value=user.driverId;
  }else{
    fRole.value="franchise";fStatus.value="active";fPassword.value="1234";
  }
  editorModal.classList.add("show");
}
function closeEditor(){editorModal.classList.remove("show")}
function saveEditor(){
  if(!fLoginId.value.trim()){toast("로그인 ID를 입력하세요");return}
  Auth.upsertUser({uid:editingUid,role:fRole.value,status:fStatus.value,name:fName.value,businessName:fBusinessName.value,businessNumber:fBusinessNumber.value,phone:fPhone.value,loginId:fLoginId.value,password:fPassword.value,brandId:fBrandId.value,storeId:fStoreId.value,supplierId:fSupplierId.value,driverId:fDriverId.value});
  closeEditor();render();toast("계정 저장 완료");
}
function statusAction(uid,action){
  const map={activate:Auth.activateUser,deactivate:Auth.deactivateUser,suspend:Auth.suspendUser,expire:Auth.expireUser};
  map[action](uid);render();toast("상태 변경 완료");
}
function resetPassword(uid){
  const result=Auth.resetPasswordByMaster(uid,{loginId:"master"});
  render();
  alert("임시 비밀번호가 발급되었습니다.\n\n계정: "+result.user.loginId+"\n임시 비밀번호: "+result.tempPassword+"\n\n사용자는 로그인 후 새 비밀번호로 변경해야 합니다.");
}
function showDetail(uid){
  const user=Auth.loadUsers().find(row=>row.uid===uid);
  detailText.textContent=JSON.stringify(user,null,2);
  detailModal.classList.add("show");
}
function closeDetail(){detailModal.classList.remove("show")}
function resetMock(){if(confirm("mock 계정 데이터를 초기화할까요?")){localStorage.removeItem("smart_balju_users_v1");Auth.loadUsers();render();toast("mock 데이터 초기화 완료")}}
render();
</script>
</body>
</html>
