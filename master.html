<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대상정보통신 Master 계정관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f7fb;--panel:#fff;--text:#162033;--muted:#6b7280;--line:#dbe3ee;--navy:#17233c;--blue:#2563eb;--green:#16a34a;--yellow:#d97706;--red:#dc2626;--purple:#7c3aed;--shadow:0 14px 40px rgba(20,31,51,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select,textarea{font:inherit}button{cursor:pointer}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.side{background:var(--navy);color:#fff;padding:24px 18px}
.brand{font-size:20px;font-weight:900}.brand small{display:block;margin-top:4px;color:rgba(255,255,255,.55);font-size:12px}
.nav{display:grid;gap:8px;margin-top:30px}.nav button{border:0;border-radius:10px;padding:12px 14px;text-align:left;background:rgba(255,255,255,.08);color:#fff;font-weight:700;transition:background .15s}
.nav button:hover{background:rgba(255,255,255,.15)}.nav button.active{background:#fff;color:var(--navy)}
.main{padding:26px;overflow:auto}
.top{display:flex;align-items:center;gap:12px;margin-bottom:18px}.title{font-size:26px;font-weight:900}.top-actions{margin-left:auto;display:flex;gap:8px}
.btn{border:1px solid var(--line);border-radius:9px;padding:9px 13px;background:var(--panel);color:var(--text);font-weight:700;transition:background .15s}
.btn:hover{background:var(--bg)}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.primary:hover{opacity:.9}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
label{display:block;margin-bottom:5px;color:var(--muted);font-size:12px;font-weight:700}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.filter{border:1px solid var(--line);border-radius:999px;padding:7px 12px;background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.filter.active{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:11px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{color:var(--muted);font-size:11px;text-transform:uppercase}
.actions{display:flex;gap:5px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:700}
.role-franchise{background:#ecfdf5;color:#047857}.role-hq{background:#eff6ff;color:#1d4ed8}
.role-supplier{background:#fff7ed;color:#c2410c}.role-driver{background:#f5f3ff;color:#6d28d9}.role-master{background:#f8fafc;color:#334155}
.status-active{background:#ecfdf5;color:#047857}.status-inactive{background:#f1f5f9;color:#475569}
.status-suspended{background:#fef2f2;color:#b91c1c}.status-expired{background:#fff7ed;color:#c2410c}
.status-password_reset_required{background:#fefce8;color:#a16207}
.mini{border:1px solid var(--line);border-radius:7px;background:#fff;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s}
.mini:hover{background:var(--bg)}.mini.green{color:var(--green)}.mini.red{color:var(--red)}.mini.yellow{color:var(--yellow)}.mini.blue{color:var(--blue)}
.muted{color:var(--muted);font-size:12px}.login-ok{color:var(--green);font-weight:700}.login-no{color:var(--red);font-weight:700}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.55);z-index:30;padding:18px}
.modal.show{display:flex}
.box{width:100%;max-width:580px;background:#fff;border-radius:18px;padding:22px;box-shadow:0 24px 80px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.box h2{margin-bottom:14px}

/* ── 권한부여 모달 ── */
.perm-section{margin-bottom:16px}
.perm-section-title{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg);border-radius:8px}
.perm-section-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sub-perms{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 4px}
.sub-perm-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:all .15s}
.sub-perm-row:hover{background:var(--bg)}
.sub-perm-row.active{background:#eff6ff;border-color:var(--blue)}
.sub-perm-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.sub-perm-label{font-size:12px;font-weight:700;color:var(--text)}
.sub-perm-sub{font-size:10px;color:var(--muted);margin-top:1px}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;border-radius:999px;padding:11px 18px;font-weight:700;font-size:13px;opacity:0;transition:.2s;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.section-divider{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;grid-column:1/-1;margin-top:6px;padding-top:10px;border-top:1px solid var(--line)}
@media(max-width:820px){.shell{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:10}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand">대상정보통신<small>Smart Balju Master</small></div>
    <div class="nav">
      <button class="active" onclick="showSection('accounts')">👥 계정관리</button>
      <button onclick="showSection('partners')">🏭 거래처 승인</button>
      <button onclick="location.href='site_hq.html'">🏢 본사 화면</button>
      <button onclick="location.href='site_franchise.html'">🏪 가맹점 화면</button>
      <button onclick="location.href='site_supplier.html'">🚚 납품업체 화면</button>
      <button onclick="location.href='site_driver.html'">🛵 배송기사 화면</button>
      <button onclick="Auth.logout()" style="margin-top:20px;background:rgba(220,38,38,.2);color:#fca5a5">🚪 로그아웃</button>
    </div>
  </aside>
  <main class="main">

    <!-- 계정관리 -->
    <div id="section-accounts">
      <div class="top">
        <div><div class="title">Master 계정관리</div><div class="muted">계정 생성·수정·권한 부여</div></div>
        <div class="top-actions">
          <button class="btn" onclick="resetMock()">초기화</button>
          <button class="btn primary" onclick="openEditor()">+ 계정 생성</button>
        </div>
      </div>
      <div class="card">
        <div class="filters" id="filters"></div>
        <div style="overflow:auto">
          <table>
            <thead><tr><th>역할</th><th>계정</th><th>상태</th><th>로그인</th><th>부여된 권한</th><th>관리</th></tr></thead>
            <tbody id="userBody"><tr><td colspan="6"><div class="loading"><div class="spinner"></div>불러오는 중...</div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 거래처 승인 -->
    <div id="section-partners" style="display:none">
      <div class="top">
        <div><div class="title">거래처 승인 관리</div><div class="muted">납품업체 첫 로그인 시 여기에 표시됩니다</div></div>
      </div>
      <div class="card">
        <div id="partnerBody"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
      </div>
    </div>

  </main>
</div>

<!-- ── 계정 편집 모달 ── -->
<div class="modal" id="editorModal">
  <div class="box">
    <h2 id="editorTitle">계정 생성</h2>
    <div class="grid">
      <div><label>역할</label><select id="fRole" onchange="toggleOkposFields()">
        <option value="hq">프랜차이즈 본사</option>
        <option value="franchise">가맹점</option>
        <option value="supplier">납품업체</option>
        <option value="driver">배송기사</option>
        <option value="master">Master</option>
      </select></div>
      <div><label>상태</label><select id="fStatus">
        <option value="active">정상</option>
        <option value="inactive">비활성</option>
        <option value="suspended">사용중지</option>
        <option value="expired">계약만료</option>
        <option value="password_reset_required">비밀번호 재설정 필요</option>
      </select></div>

      <div class="section-divider">기본 정보</div>
      <div><label>담당자명</label><input id="fName"></div>
      <div><label>상호명</label><input id="fBusinessName"></div>
      <div><label>사업자번호</label><input id="fBusinessNumber"></div>
      <div><label>연락처</label><input id="fPhone"></div>

      <div class="section-divider">로그인 정보</div>
      <div><label>로그인 ID</label><input id="fLoginId"></div>
      <div><label>비밀번호 <span style="color:var(--muted);font-weight:400">(수정 시 비워두면 유지)</span></label><input id="fPassword" type="password"></div>

      <!-- OKPos 정보 (가맹점/본사 역할일 때만 표시) -->
      <div class="section-divider" id="okposDivider" style="display:none">OKPos 연동</div>
      <div id="okposIdWrap" style="display:none"><label>OKPos 아이디</label><input id="fOkposId" placeholder="OKPos 로그인 아이디"></div>
      <div id="okposPwWrap" style="display:none"><label>OKPos 비밀번호</label><input id="fOkposPw" type="password" placeholder="OKPos 비밀번호"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn" onclick="closeEditor()">취소</button>
      <button class="btn primary" onclick="saveEditor()">저장</button>
    </div>
  </div>
</div>

<!-- ── 권한부여 모달 ── -->
<div class="modal" id="permModal">
  <div class="box" style="max-width:620px">
    <h2>🔑 권한부여</h2>
    <div id="permTargetName" style="color:var(--muted);margin-bottom:16px;font-size:14px"></div>
    <div id="permGrid"></div>
    <div style="margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px;font-size:12px;color:var(--muted)">
      ※ 체크된 기능만 해당 계정에서 탭/메뉴가 보입니다. 결제 플랜에 따라 차등 부여하세요.
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn" onclick="closePerm()">취소</button>
      <button class="btn primary" onclick="savePerm()">저장</button>
    </div>
  </div>
</div>

<!-- 상세보기 모달 -->
<div class="modal" id="detailModal">
  <div class="box">
    <h2>계정 상세보기</h2>
    <pre id="detailText" style="white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:12px;max-height:60vh;overflow:auto"></pre>
    <div style="margin-top:14px;text-align:right"><button class="btn primary" onclick="closeDetail()">닫기</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="auth.js"></script>
<script>
const Auth = window.SmartBaljuAuth;
let filter='all', editingUid='', permUid='', _users=[];

const FILTERS=[
  ['all','전체'],['hq','본사'],['franchise','가맹점'],['supplier','납품업체'],['driver','배송기사'],
  ['active','활성'],['inactive','비활성'],['suspended','사용중지'],
];

// 역할별 권한 항목 정의
const PERM_DEFS = {
  hq: {
    label:'프랜차이즈 본사', color:'#1d4ed8', bg:'#eff6ff', dot:'#3b82f6',
    items:[
      {key:'hq_dashboard',    label:'대시보드',       sub:'매출·KPI 현황'},
      {key:'hq_orders',       label:'주문 통합 관리', sub:'발주 승인·반려'},
      {key:'hq_delivery',     label:'배송 관리',      sub:'배송 현황 조회'},
      {key:'hq_register',     label:'기준정보 등록',  sub:'거래처·메뉴·가격'},
      {key:'hq_partners',     label:'거래처 관리',    sub:'납품업체 목록'},
      {key:'hq_stats',        label:'통계·분석',      sub:'매출 분석'},
      {key:'hq_settle',       label:'정산 관리',      sub:'입출금 정산'},
      {key:'hq_notice',       label:'공지·레시피',    sub:'공지사항 관리'},
      {key:'hq_okpos',        label:'OKPos 매출연동', sub:'자동 매출 수집'},
    ]
  },
  franchise: {
    label:'가맹점', color:'#047857', bg:'#ecfdf5', dot:'#10b981',
    items:[
      {key:'fr_home',     label:'홈·대시보드', sub:'수발주 현황·재고'},
      {key:'fr_order',    label:'발주하기',    sub:'품목 선택·장바구니'},
      {key:'fr_delivery', label:'배송 추적',   sub:'실시간 배송 현황'},
      {key:'fr_sales',    label:'매출 현황',   sub:'일별·월별 매출'},
      {key:'fr_stats',    label:'통계',        sub:'매출 분석 차트'},
    ]
  },
  supplier: {
    label:'납품업체', color:'#c2410c', bg:'#fff7ed', dot:'#f97316',
    items:[
      {key:'sup_register', label:'등록관리',  sub:'기사·가맹점 등록'},
      {key:'sup_assign',   label:'배송배정',  sub:'배송 생성·기사 배정'},
      {key:'sup_slip',     label:'전표출력',  sub:'배송전표 인쇄·링크'},
      {key:'sup_settle',   label:'정산관리',  sub:'납품 내역·정산'},
    ]
  },
};

function esc(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2600); }

function showSection(id){
  ['accounts','partners'].forEach(s=>{ document.getElementById('section-'+s).style.display=s===id?'':'none'; });
  document.querySelectorAll('.side .nav button').forEach((b,i)=>b.classList.toggle('active',i===['accounts','partners'].indexOf(id)));
  if(id==='partners') loadPartnersSection();
}

// OKPos 필드 토글 (가맹점·본사만 표시)
function toggleOkposFields(){
  const role = document.getElementById('fRole').value;
  const show = ['franchise','hq'].includes(role);
  ['okposDivider','okposIdWrap','okposPwWrap'].forEach(id=>{
    document.getElementById(id).style.display = show ? '' : 'none';
  });
}

// ── 사용자 테이블 ──────────────────────────────────────────
function loginAvailable(u){ return !Auth.BLOCKED_LOGIN_STATUSES.includes(u.status); }

function renderFilters(){
  document.getElementById('filters').innerHTML=FILTERS.map(([k,l])=>
    `<button class="filter ${filter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`
  ).join('');
}
function setFilter(key){ filter=key; render(); }
function filteredUsers(){ return _users.filter(u=>filter==='all'||u.role===filter||u.status===filter); }

function permBadges(u){
  const p = u.permissions||{};
  const active = Object.keys(p).filter(k=>p[k]);
  if(!active.length) return '<span style="color:var(--muted);font-size:11px">없음</span>';
  // 카테고리별 그룹핑
  const groups={hq:0,fr:0,sup:0};
  active.forEach(k=>{ if(k.startsWith('hq_'))groups.hq++; else if(k.startsWith('fr_'))groups.fr++; else if(k.startsWith('sup_'))groups.sup++; });
  let badges='';
  if(groups.hq) badges+=`<span class="pill role-hq" style="font-size:10px;margin:1px">본사 ${groups.hq}개</span>`;
  if(groups.fr) badges+=`<span class="pill role-franchise" style="font-size:10px;margin:1px">가맹점 ${groups.fr}개</span>`;
  if(groups.sup) badges+=`<span class="pill role-supplier" style="font-size:10px;margin:1px">납품업체 ${groups.sup}개</span>`;
  return badges||'<span style="color:var(--muted);font-size:11px">없음</span>';
}

function render(){
  renderFilters();
  const users=filteredUsers();
  document.getElementById('userBody').innerHTML=users.length===0
    ?'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">계정이 없습니다.</td></tr>'
    :users.map(u=>`<tr>
      <td><span class="pill role-${esc(u.role)}">${esc(Auth.ROLE_LABELS[u.role]||u.role)}</span></td>
      <td><strong>${esc(u.businessName||u.name||'-')}</strong>
        <div class="muted">${esc(u.name)} · ${esc(u.loginId)}</div>
        ${u.okposId?`<div style="font-size:11px;color:#6366f1">OKPos: ${esc(u.okposId)}</div>`:''}
        <div class="muted">${esc(u.businessNumber||'')}</div></td>
      <td><span class="pill status-${esc(u.status)}">${esc(Auth.STATUS_LABELS[u.status]||u.status)}</span></td>
      <td>${loginAvailable(u)?'<span class="login-ok">가능</span>':'<span class="login-no">불가</span>'}
        ${u.mustChangePassword?'<div class="muted" style="font-size:10px">비번변경필요</div>':''}</td>
      <td>${permBadges(u)}
        ${u.role!=='master'?`<br><button class="mini blue" style="margin-top:4px" onclick="openPerm('${esc(u.uid)}')">🔑 권한부여</button>`:''}</td>
      <td><div class="actions">
        <button class="mini blue" onclick="openEditor('${esc(u.uid)}')">수정</button>
        <button class="mini green" onclick="doStatus('${esc(u.uid)}','active')">활성화</button>
        <button class="mini" onclick="doStatus('${esc(u.uid)}','inactive')">비활성</button>
        <button class="mini yellow" onclick="doStatus('${esc(u.uid)}','suspended')">중지</button>
        <button class="mini red" onclick="doStatus('${esc(u.uid)}','expired')">만료</button>
        <button class="mini blue" onclick="doResetPw('${esc(u.uid)}')">비번초기화</button>
        <button class="mini" onclick="showDetail('${esc(u.uid)}')">상세</button>
        ${u.role!=='master'?`<button class="mini red" onclick="doDelete('${esc(u.uid)}')">삭제</button>`:''}
      </div></td>
    </tr>`).join('');
}

async function refreshUsers(){ _users=await Auth.loadUsers(); render(); }

// ── 편집 ──────────────────────────────────────────────────
function openEditor(uid){
  editingUid=uid||'';
  const u=uid?_users.find(x=>x.uid===uid):null;
  document.getElementById('editorTitle').textContent=u?'계정 수정':'계정 생성';
  ['fRole','fStatus','fName','fBusinessName','fBusinessNumber','fPhone','fLoginId','fPassword','fOkposId','fOkposPw']
    .forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  if(u){
    fRole.value=u.role; fStatus.value=u.status; fName.value=u.name||'';
    fBusinessName.value=u.businessName||''; fBusinessNumber.value=u.businessNumber||'';
    fPhone.value=u.phone||''; fLoginId.value=u.loginId||'';
    fOkposId.value=u.okposId||''; fOkposPw.value=''; // 비번은 보안상 빈칸
  } else {
    fRole.value='franchise'; fStatus.value='active'; fPassword.value='1234';
  }
  toggleOkposFields();
  editorModal.classList.add('show');
}
function closeEditor(){ editorModal.classList.remove('show'); }
async function saveEditor(){
  if(!fLoginId.value.trim()){ toast('로그인 ID를 입력하세요'); return; }
  await Auth.upsertUser({
    uid:editingUid, role:fRole.value, status:fStatus.value,
    name:fName.value, businessName:fBusinessName.value,
    businessNumber:fBusinessNumber.value, phone:fPhone.value,
    loginId:fLoginId.value, password:fPassword.value||undefined,
    okposId:fOkposId.value, okposPw:fOkposPw.value||undefined,
  });
  closeEditor(); await refreshUsers(); toast('계정 저장 완료');
}

async function doStatus(uid,status){ await Auth.setUserStatus(uid,status); await refreshUsers(); toast('상태 변경 완료'); }
async function doResetPw(uid){
  const result=await Auth.resetPasswordByMaster(uid);
  await refreshUsers();
  alert(`임시 비밀번호 발급\n\n계정: ${result.user.loginId}\n임시 비밀번호: ${result.tempPassword}\n\n사용자는 로그인 후 새 비밀번호로 변경해야 합니다.`);
}
async function doDelete(uid){ if(!confirm('정말 삭제하시겠습니까?')) return; await Auth.deleteUser(uid); await refreshUsers(); toast('삭제 완료'); }
function showDetail(uid){
  const u=_users.find(x=>x.uid===uid);
  const safe={...u}; delete safe.passwordHash; delete safe.okposPwHash;
  detailText.textContent=JSON.stringify(safe,null,2);
  detailModal.classList.add('show');
}
function closeDetail(){ detailModal.classList.remove('show'); }

// ── 권한부여 모달 ─────────────────────────────────────────
function openPerm(uid){
  permUid=uid;
  const u=_users.find(x=>x.uid===uid);
  const p=u?.permissions||{};
  document.getElementById('permTargetName').innerHTML=
    `<strong>${u?.businessName||u?.name||uid}</strong> 의 기능 접근 권한을 설정합니다.`;

  // 역할에 따라 관련 섹션만 표시 (전체 표시도 가능)
  const sections = Object.entries(PERM_DEFS);
  document.getElementById('permGrid').innerHTML = sections.map(([roleKey, def])=>`
    <div class="perm-section">
      <div class="perm-section-title">
        <div class="dot" style="background:${def.dot}"></div>
        <span>${def.label}</span>
        <button onclick="toggleAll('${roleKey}', true)" style="margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;border:1px solid var(--line);background:#fff;cursor:pointer">전체선택</button>
        <button onclick="toggleAll('${roleKey}', false)" style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;border:1px solid var(--line);background:#fff;cursor:pointer">전체해제</button>
      </div>
      <div class="sub-perms">
        ${def.items.map(item=>`
          <label class="sub-perm-row ${p[item.key]?'active':''}" id="permrow_${item.key}">
            <input type="checkbox" id="perm_${item.key}" data-role="${roleKey}" ${p[item.key]?'checked':''} onchange="togglePermRow('${item.key}')">
            <div>
              <div class="sub-perm-label">${item.label}</div>
              <div class="sub-perm-sub">${item.sub}</div>
            </div>
          </label>`).join('')}
      </div>
    </div>`).join('');

  permModal.classList.add('show');
}

function togglePermRow(key){
  const checked=document.getElementById('perm_'+key).checked;
  document.getElementById('permrow_'+key).classList.toggle('active',checked);
}
function toggleAll(roleKey, val){
  const def=PERM_DEFS[roleKey];
  def.items.forEach(item=>{
    const el=document.getElementById('perm_'+item.key);
    if(el){ el.checked=val; document.getElementById('permrow_'+item.key).classList.toggle('active',val); }
  });
}
function closePerm(){ permModal.classList.remove('show'); }
async function savePerm(){
  const perms={};
  Object.values(PERM_DEFS).forEach(def=>{
    def.items.forEach(item=>{ perms[item.key]=document.getElementById('perm_'+item.key)?.checked||false; });
  });
  await Auth.setPermissions(permUid,perms);
  await refreshUsers(); closePerm(); toast('권한 저장 완료');
}

// ── 거래처 섹션 ───────────────────────────────────────────
async function loadPartnersSection(){
  const partners=await Auth.loadPartners();
  const el=document.getElementById('partnerBody');
  if(!partners.length){ el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">등록된 거래처 요청이 없습니다.</div>'; return; }
  el.innerHTML=`<table><thead><tr><th>상호명</th><th>사업자번호</th><th>연락처</th><th>상태</th><th>등록일</th><th>관리</th></tr></thead><tbody>
    ${partners.map(p=>`<tr>
      <td><strong>${esc(p.name||'-')}</strong></td>
      <td>${esc(p.businessNumber||'-')}</td>
      <td>${esc(p.phone||'-')}</td>
      <td><span class="pill ${p.status==='active'?'status-active':'status-inactive'}">${p.status==='active'?'승인됨':'승인대기'}</span></td>
      <td class="muted">${(p.createdAt||'').slice(0,10)}</td>
      <td><div class="actions">
        <button class="mini green" onclick="approvePartner('${p.id}')">승인</button>
        <button class="mini" onclick="deactivatePartner('${p.id}')">비활성화</button>
        <button class="mini red" onclick="deletePartner('${p.id}')">삭제</button>
      </div></td>
    </tr>`).join('')}</tbody></table>`;
}
async function approvePartner(id){ await Auth.updatePartner(id,{status:'active'}); await loadPartnersSection(); toast('승인 완료'); }
async function deactivatePartner(id){ await Auth.updatePartner(id,{status:'inactive'}); await loadPartnersSection(); toast('비활성화'); }
async function deletePartner(id){ if(!confirm('삭제할까요?')) return; await Auth.deletePartner(id); await loadPartnersSection(); toast('삭제 완료'); }

// ── 초기화 ────────────────────────────────────────────────
async function resetMock(){
  if(!confirm('master 계정을 제외한 모든 계정을 삭제할까요?')) return;
  const users=await Auth.loadUsers();
  for(const u of users){ if(u.role!=='master') await Auth.deleteUser(u.uid); }
  await refreshUsers(); toast('초기화 완료');
}

document.addEventListener('firebaseReady', refreshUsers);
if(Auth.isFirebaseReady) refreshUsers();
else setTimeout(refreshUsers, 2000);
</script>
